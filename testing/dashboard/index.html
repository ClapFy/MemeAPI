<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeAPI Testing Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2rem;
            font-weight: 300;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #666;
            margin-bottom: 32px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 24px;
        }

        .panel-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #666;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #888;
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.3);
        }

        input::placeholder {
            color: #555;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            width: 100%;
            padding: 14px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        button.secondary {
            background: transparent;
            border-color: rgba(255, 255, 255, 0.1);
        }

        button.secondary:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .response {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 12px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 400px;
            overflow-y: auto;
        }

        .response.error {
            border: 1px solid rgba(255, 100, 100, 0.3);
        }

        .response.success {
            border: 1px solid rgba(100, 255, 100, 0.3);
        }

        .image-preview {
            margin-top: 16px;
            border-radius: 8px;
            overflow: hidden;
            max-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
        }

        .image-preview img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 16px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 300;
            color: #fff;
        }

        .stat-label {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .history-time {
            font-size: 11px;
            color: #666;
            margin-bottom: 4px;
        }

        .history-url {
            font-size: 12px;
            color: #888;
            word-break: break-all;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 500;
        }

        .status.success {
            background: rgba(100, 255, 100, 0.1);
            color: #4ade80;
        }

        .status.error {
            background: rgba(255, 100, 100, 0.1);
            color: #f87171;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .url-display {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            color: #888;
            word-break: break-all;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MemeAPI Testing Dashboard</h1>
        <p class="subtitle">Test your API integration with any parameters</p>

        <div class="grid">
            <div class="panel">
                <div class="panel-title">Configuration</div>
                
                <div class="form-group">
                    <label>API Key</label>
                    <input type="text" id="apiKey" placeholder="Enter your API key">
                </div>

                <div class="form-group">
                    <label>Base URL</label>
                    <input type="text" id="baseUrl" value="http://localhost:3000" placeholder="API base URL">
                </div>

                <div class="form-group">
                    <label>Search Query</label>
                    <input type="text" id="query" placeholder="e.g., funny cat">
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>Subreddit</label>
                        <input type="text" id="subreddit" placeholder="e.g., memes">
                    </div>
                    <div class="form-group">
                        <label>Count</label>
                        <input type="number" id="count" value="10" min="1" max="50">
                    </div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>Min Upvotes</label>
                        <input type="number" id="minUpvotes" placeholder="e.g., 1000">
                    </div>
                    <div class="form-group">
                        <label>Max Upvotes</label>
                        <input type="number" id="maxUpvotes" placeholder="e.g., 50000">
                    </div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>Sort</label>
                        <select id="sort">
                            <option value="hot">Hot</option>
                            <option value="top">Top</option>
                            <option value="new">New</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>NSFW</label>
                        <select id="nsfw">
                            <option value="false">Exclude</option>
                            <option value="true">Include</option>
                        </select>
                    </div>
                </div>

                <button onclick="testJSON()">Test JSON Endpoint</button>
                <button class="secondary" onclick="testImage()" style="margin-top: 8px;">Test Image Endpoint</button>
                <button class="secondary" onclick="testHealth()" style="margin-top: 8px;">Test Health Check</button>
            </div>

            <div class="panel">
                <div class="panel-title">Response</div>
                
                <div class="url-display" id="requestUrl">No request made yet</div>
                
                <div id="status"></div>
                <div id="response"></div>
                <div id="imagePreview"></div>
                <div id="stats"></div>
            </div>
        </div>

        <div class="panel" style="margin-top: 24px;">
            <div class="panel-title">Request History</div>
            <div id="history"></div>
        </div>
    </div>

    <script>
        let requestHistory = [];

        function buildUrl(endpoint) {
            const baseUrl = document.getElementById('baseUrl').value.replace(/\/$/, '');
            const params = new URLSearchParams();
            
            const apiKey = document.getElementById('apiKey').value;
            const query = document.getElementById('query').value;
            const subreddit = document.getElementById('subreddit').value;
            const count = document.getElementById('count').value;
            const minUpvotes = document.getElementById('minUpvotes').value;
            const maxUpvotes = document.getElementById('maxUpvotes').value;
            const sort = document.getElementById('sort').value;
            const nsfw = document.getElementById('nsfw').value;

            if (apiKey) params.append('apiKey', apiKey);
            if (query) params.append('query', query);
            if (subreddit) params.append('subreddit', subreddit);
            if (count) params.append('count', count);
            if (minUpvotes) params.append('minUpvotes', minUpvotes);
            if (maxUpvotes) params.append('maxUpvotes', maxUpvotes);
            params.append('sort', sort);
            params.append('nsfw', nsfw);

            return `${baseUrl}${endpoint}?${params.toString()}`;
        }

        function setLoading(loading) {
            const buttons = document.querySelectorAll('button');
            buttons.forEach(btn => btn.disabled = loading);
        }

        function showStatus(type, message) {
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = `<span class="status ${type}">${type === 'success' ? 'Success' : 'Error'}: ${message}</span>`;
        }

        function addToHistory(url, type, success) {
            const history = {
                time: new Date().toLocaleTimeString(),
                url: url,
                type: type,
                success: success
            };
            requestHistory.unshift(history);
            if (requestHistory.length > 10) requestHistory.pop();
            renderHistory();
        }

        function renderHistory() {
            const historyEl = document.getElementById('history');
            if (requestHistory.length === 0) {
                historyEl.innerHTML = '<div style="color: #555;">No requests yet</div>';
                return;
            }

            historyEl.innerHTML = requestHistory.map(h => `
                <div class="history-item" onclick="loadUrl('${h.url}')">
                    <div class="history-time">${h.time} - ${h.type}</div>
                    <div class="history-url">${h.url}</div>
                </div>
            `).join('');
        }

        function loadUrl(url) {
            document.getElementById('requestUrl').textContent = url;
        }

        async function testJSON() {
            setLoading(true);
            const url = buildUrl('/api/memes');
            document.getElementById('requestUrl').textContent = url;
            
            const startTime = performance.now();
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                const duration = Math.round(performance.now() - startTime);
                
                const responseEl = document.getElementById('response');
                responseEl.innerHTML = `<pre class="response ${data.success ? 'success' : 'error'}">${JSON.stringify(data, null, 2)}</pre>`;
                
                showStatus(data.success ? 'success' : 'error', `${response.status} (${duration}ms)`);
                
                if (data.success && data.data?.memes) {
                    const memes = data.data.memes;
                    document.getElementById('stats').innerHTML = `
                        <div class="stats">
                            <div class="stat">
                                <div class="stat-value">${memes.length}</div>
                                <div class="stat-label">Memes</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${data.data.meta?.remainingRequests || 'N/A'}</div>
                                <div class="stat-label">Remaining</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${duration}ms</div>
                                <div class="stat-label">Response</div>
                            </div>
                        </div>
                    `;
                }
                
                addToHistory(url, 'JSON', data.success);
            } catch (error) {
                showStatus('error', error.message);
                document.getElementById('response').innerHTML = `<pre class="response error">${error.message}</pre>`;
                addToHistory(url, 'JSON', false);
            }
            
            setLoading(false);
        }

        async function testImage() {
            setLoading(true);
            const url = buildUrl('/api/memes/image');
            document.getElementById('requestUrl').textContent = url;
            
            const startTime = performance.now();
            
            try {
                const response = await fetch(url);
                const duration = Math.round(performance.now() - startTime);
                
                if (response.ok) {
                    const blob = await response.blob();
                    const imageUrl = URL.createObjectURL(blob);
                    
                    document.getElementById('imagePreview').innerHTML = `
                        <div class="image-preview">
                            <img src="${imageUrl}" alt="Meme">
                        </div>
                    `;
                    
                    showStatus('success', `Image received (${duration}ms)`);
                    document.getElementById('response').innerHTML = '';
                } else {
                    const data = await response.json();
                    showStatus('error', data.error || 'Failed to load image');
                    document.getElementById('response').innerHTML = `<pre class="response error">${JSON.stringify(data, null, 2)}</pre>`;
                }
                
                addToHistory(url, 'Image', response.ok);
            } catch (error) {
                showStatus('error', error.message);
                addToHistory(url, 'Image', false);
            }
            
            setLoading(false);
        }

        async function testHealth() {
            setLoading(true);
            const baseUrl = document.getElementById('baseUrl').value.replace(/\/$/, '');
            const url = `${baseUrl}/api/health`;
            document.getElementById('requestUrl').textContent = url;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                const responseEl = document.getElementById('response');
                responseEl.innerHTML = `<pre class="response ${data.status === 'healthy' ? 'success' : 'error'}">${JSON.stringify(data, null, 2)}</pre>`;
                
                showStatus(data.status === 'healthy' ? 'success' : 'error', data.status);
                addToHistory(url, 'Health', data.status === 'healthy');
            } catch (error) {
                showStatus('error', error.message);
                document.getElementById('response').innerHTML = `<pre class="response error">${error.message}</pre>`;
                addToHistory(url, 'Health', false);
            }
            
            setLoading(false);
        }

        renderHistory();
    </script>
</body>
</html>
